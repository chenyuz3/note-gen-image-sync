<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Thesis Steward 与 Editorial Compass 工作流</title><desc id="desc">Thesis Steward 与 Editorial Compass 工作流</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.t{font-size:42px;font-weight:760}.s{font-size:22px;fill:#64748b}.k{font-size:72px;font-weight:780}.h{font-size:27px;font-weight:720}.b{font-size:22px}.sm{font-size:18px;fill:#64748b}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px}</style><text x="90" y="105" class="t">Deep Research workflow：新增一个真正拥有“减法”的转换层</text><text x="90" y="150" class="s">Thesis Steward / Editorial Compass 把研究覆盖与成稿主线分开治理</text><rect x="90" y="235" width="300" height="120" rx="24" fill="#eff5ff" stroke="#dce5ef"/><text x="240" y="290" text-anchor="middle" class="h" style="font-size:22px">Contract</text><text x="240" y="323" text-anchor="middle" class="sm">01</text><path d="M 390 295 H 445" stroke="#376ee6" stroke-width="5"/><polygon points="445,295 431,287 431,303" fill="#376ee6"/><rect x="460" y="235" width="300" height="120" rx="24" fill="#f7f3ff" stroke="#dce5ef"/><text x="610" y="290" text-anchor="middle" class="h" style="font-size:22px">Compass init</text><text x="610" y="323" text-anchor="middle" class="sm">02</text><path d="M 760 295 H 815" stroke="#376ee6" stroke-width="5"/><polygon points="815,295 801,287 801,303" fill="#376ee6"/><rect x="830" y="235" width="300" height="120" rx="24" fill="#eef8f3" stroke="#dce5ef"/><text x="980" y="290" text-anchor="middle" class="h" style="font-size:22px">Search</text><text x="980" y="323" text-anchor="middle" class="sm">03</text><path d="M 1130 295 H 1185" stroke="#376ee6" stroke-width="5"/><polygon points="1185,295 1171,287 1171,303" fill="#376ee6"/><rect x="1200" y="235" width="300" height="120" rx="24" fill="#eef8f3" stroke="#dce5ef"/><text x="1350" y="290" text-anchor="middle" class="h" style="font-size:22px">Reflect + QE</text><text x="1350" y="323" text-anchor="middle" class="sm">04</text><path d="M 1350 355 V 405 H 240 V 495" stroke="#376ee6" stroke-width="5" fill="none"/><polygon points="240,500 232,486 248,486" fill="#376ee6"/><rect x="90" y="495" width="300" height="120" rx="24" fill="#f7f3ff" stroke="#dce5ef"/><text x="240" y="550" text-anchor="middle" class="h" style="font-size:22px">Steward update</text><text x="240" y="583" text-anchor="middle" class="sm">05</text><path d="M 390 555 H 445" stroke="#376ee6" stroke-width="5"/><polygon points="445,555 431,547 431,563" fill="#376ee6"/><rect x="460" y="495" width="300" height="120" rx="24" fill="#fff5eb" stroke="#dce5ef"/><text x="610" y="550" text-anchor="middle" class="h" style="font-size:22px">Outline</text><text x="610" y="583" text-anchor="middle" class="sm">06</text><path d="M 760 555 H 815" stroke="#376ee6" stroke-width="5"/><polygon points="815,555 801,547 801,563" fill="#376ee6"/><rect x="830" y="495" width="300" height="120" rx="24" fill="#fff5eb" stroke="#dce5ef"/><text x="980" y="550" text-anchor="middle" class="h" style="font-size:22px">Writer</text><text x="980" y="583" text-anchor="middle" class="sm">07</text><path d="M 1130 555 H 1185" stroke="#376ee6" stroke-width="5"/><polygon points="1185,555 1171,547 1171,563" fill="#376ee6"/><rect x="1200" y="495" width="300" height="120" rx="24" fill="#fff1f2" stroke="#dce5ef"/><text x="1350" y="550" text-anchor="middle" class="h" style="font-size:22px">Report QA</text><text x="1350" y="583" text-anchor="middle" class="sm">08</text><rect x="90" y="770" width="1420" height="72" rx="18" fill="#f7f3ff"/><text x="125" y="815" class="b">边际：steward 负责裁“进不进主线”，verification 仍负责裁真伪；职责分离防止新角色变成事实仲裁者。</text></svg>