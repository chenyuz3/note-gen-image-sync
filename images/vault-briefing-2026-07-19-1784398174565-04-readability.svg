<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">三份报告可读性对比</title><desc id="desc">三份报告可读性对比</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#162033}.t{font-size:42px;font-weight:700}.s{font-size:22px;fill:#65758b}.k{font-size:72px;font-weight:760}.h{font-size:26px;font-weight:700}.b{font-size:22px}.sm{font-size:18px;fill:#65758b}</style><text x="90" y="105" class="t">可读性差异来自结构与编辑，不只是研究深度</text><text x="90" y="150" class="s">Register C：超 60 字句占比；体量为正文字符数（审计笔记实测）</text><text x="90" y="250" class="h">B：中文译稿</text><rect x="400" y="216" width="930" height="54" rx="27" fill="#f5f7fa"/><rect x="400" y="216" width="840.4" height="54" rx="27" fill="#d95c67"/><text x="1360" y="258" class="h">49.7%</text><text x="400" y="312" class="sm">正文约 37.0k 字符</text><text x="90" y="420" class="h">A：长报告</text><rect x="400" y="386" width="930" height="54" rx="27" fill="#f5f7fa"/><rect x="400" y="386" width="747.4" height="54" rx="27" fill="#e78a3a"/><text x="1360" y="428" class="h">44.2%</text><text x="400" y="482" class="sm">正文约 40.7k 字符</text><text x="90" y="590" class="h">A：接受重写</text><rect x="400" y="556" width="930" height="54" rx="27" fill="#f5f7fa"/><rect x="400" y="556" width="121.7" height="54" rx="27" fill="#3f9b73"/><text x="1360" y="598" class="h">7.2%</text><text x="400" y="652" class="sm">正文约 11.2k 字符</text><rect x="90" y="765" width="1420" height="70" rx="18" fill="#eef8f3"/><text x="125" y="810" class="b">11.2k 的接受重写把长句占比降到 7.2%，但同时删去了多硬件 ROI 与商业验证；压缩有效，仍需 Appendix 分层。</text></svg>