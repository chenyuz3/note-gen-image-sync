<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#f7f8fa"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial,sans-serif;fill:#172033}.t{font-size:34px;font-weight:700}.sub{font-size:18px;fill:#607086}.n{font-size:46px;font-weight:760}.l{font-size:19px;font-weight:650}.s{font-size:15px;fill:#607086}</style><text x="60" y="62" class="t">WFE：同一个 AI beta，三条证据强度不同</text><text x="60" y="96" class="sub">把全球情景、中国当前进口与 Hybrid Bonding 采用路径放在同一条件图中。</text><rect x="60" y="145" width="330" height="380" rx="24" fill="#eaf4ff" stroke="#dfe5ec"/><text x="85" y="190" class="l">全球 AI-WFE 情景</text><text x="85" y="245" class="sub">50GW/年增量 compute</text><text x="85" y="298" class="sub">→ 264K logic / 365K HBM</text><text x="85" y="351" class="sub">→ 1,220K DRAM / 458K NAND WSPM</text><text x="85" y="404" class="sub">→ 2027–29E AI WFE $376bn</text><line x1="85" y1="463" x2="365" y2="463" stroke="#ccd5df"/><text x="85" y="498" class="s">模型 / 中确信</text><rect x="435" y="145" width="330" height="380" rx="24" fill="#fff2df" stroke="#dfe5ec"/><text x="460" y="190" class="l">中国 WFE 当前读数</text><text x="460" y="245" class="sub">2026年6月 $3.414bn</text><text x="460" y="298" class="sub">MoM +57% / YoY +1%</text><text x="460" y="351" class="sub">2026 YTD $15.554bn</text><text x="460" y="404" class="sub">YTD -10%；Litho -18%</text><line x1="460" y1="463" x2="740" y2="463" stroke="#ccd5df"/><text x="460" y="498" class="s">海关总额 / 高确信</text><rect x="810" y="145" width="330" height="380" rx="24" fill="#eef5ee" stroke="#dfe5ec"/><text x="835" y="190" class="l">Hybrid Bonding 分叉</text><text x="835" y="245" class="sub">TSMC SoIC：10→80kwpm</text><text x="835" y="298" class="sub">logic 路径已有产品与扩产</text><text x="835" y="351" class="sub">HBM 仍取决于 stack height</text><text x="835" y="404" class="sub">12-hi / 16-hi / thermal</text><line x1="835" y1="463" x2="1115" y2="463" stroke="#ccd5df"/><text x="835" y="498" class="s">logic 中高；HBM 时点低到中</text><text x="60" y="585" class="l">条件性判断</text><text x="60" y="625" class="sub">全球需求弹性、当前中国进口与具体工艺 adoption 不是同一证据层；不能用一个乐观情景覆盖另两条反证。</text><text x="60" y="662" class="s">来源：候选笔记中的海关数据、卖方模型与技术路线；本图为本次 briefing 的二次合成，不是原始披露。</text></svg>