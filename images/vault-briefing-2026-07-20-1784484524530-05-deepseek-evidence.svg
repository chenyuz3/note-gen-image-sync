<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">DeepSeek 黑箱异常证据层级</title><desc id="desc">DeepSeek 黑箱异常证据层级</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.t{font-size:42px;font-weight:760}.s{font-size:22px;fill:#64748b}.k{font-size:72px;font-weight:780}.h{font-size:27px;font-weight:720}.b{font-size:22px}.sm{font-size:18px;fill:#64748b}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px}</style><text x="90" y="105" class="t">DeepSeek 黑箱异常：把“看见了什么”与“推断了什么”拆开</text><text x="90" y="150" class="s">单线程、选定截图、无 raw API log；最稳健结论是值得复现，不是已经证实 routing</text><rect x="90" y="220" width="1420" height="105" rx="24" fill="#3d8c6a" opacity="0.14"/><text x="125" y="267" class="h">可见事实</text><text x="390" y="267" class="b">截图展示知识回答与 3D 结果随 prompt 条件变化</text><text x="390" y="298" class="sm">证据层级 1 / 4</text><rect x="180" y="365" width="1240" height="105" rx="24" fill="#376ee6" opacity="0.16"/><text x="215" y="412" class="h">中等推断</text><text x="480" y="412" class="b">选定样本存在条件相关的输出差异</text><text x="480" y="443" class="sm">证据层级 2 / 4</text><rect x="270" y="510" width="1060" height="105" rx="24" fill="#dd7a2c" opacity="0.18000000000000002"/><text x="305" y="557" class="h">低确信假设</text><text x="570" y="557" class="b">路由到 Claude Fable 5 / classifier fallback</text><text x="570" y="588" class="sm">证据层级 3 / 4</text><rect x="360" y="655" width="880" height="105" rx="24" fill="#cb5360" opacity="0.2"/><text x="395" y="702" class="h">当前不支持</text><text x="660" y="702" class="b">大规模收集输出并用于 distillation</text><text x="660" y="733" class="sm">证据层级 4 / 4</text><rect x="90" y="815" width="1420" height="48" rx="16" fill="#f5f7fa"/><text x="125" y="847" class="sm">缺口：完整 prompt、headers、backend ID、版本、解码参数、网络 trace、重复试验、失败样本、独立复现。</text></svg>