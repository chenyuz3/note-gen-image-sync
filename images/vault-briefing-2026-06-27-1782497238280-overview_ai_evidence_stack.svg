<text x="70" y="148" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="22" fill="#475569">今天的五篇材料共同指向一个主题：AI 能力评估必须同时控制测量环境、训练外推和系统实现约束。</text>
