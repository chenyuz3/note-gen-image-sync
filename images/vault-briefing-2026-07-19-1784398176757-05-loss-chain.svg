<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">研究到报告的损失链</title><desc id="desc">研究到报告的损失链</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#162033}.t{font-size:42px;font-weight:700}.s{font-size:22px;fill:#65758b}.k{font-size:72px;font-weight:760}.h{font-size:26px;font-weight:700}.b{font-size:22px}.sm{font-size:18px;fill:#65758b}</style><text x="90" y="105" class="t">损失链：研究材料没有经过“编译”</text><text x="90" y="150" class="s">两份新增审计笔记的共同因果链</text><rect x="70" y="330" width="220" height="120" rx="22" fill="#eff5ff" stroke="#dfe6ef"/><text x="180" y="378" text-anchor="middle" class="h" style="font-size:19px"><tspan x="180">Original</tspan><tspan x="180" dy="30">Prompt</tspan></text><path d="M 290 390 C 308 390, 302 580, 320 580" fill="none" stroke="#376ee6" stroke-width="5"/><polygon points="320,580 306,572 306,588" fill="#376ee6"/><rect x="320" y="520" width="220" height="120" rx="22" fill="#eef8f3" stroke="#dfe6ef"/><text x="430" y="568" text-anchor="middle" class="h" style="font-size:19px"><tspan x="430">MECE +</tspan><tspan x="430" dy="30">QE / Divergent</tspan></text><path d="M 540 580 C 558 580, 552 390, 570 390" fill="none" stroke="#376ee6" stroke-width="5"/><polygon points="570,390 556,382 556,398" fill="#376ee6"/><rect x="570" y="330" width="220" height="120" rx="22" fill="#fff5eb" stroke="#dfe6ef"/><text x="680" y="378" text-anchor="middle" class="h" style="font-size:19px"><tspan x="680">高冗余</tspan><tspan x="680" dy="30">research notes</tspan></text><path d="M 790 390 C 808 390, 802 580, 820 580" fill="none" stroke="#376ee6" stroke-width="5"/><polygon points="820,580 806,572 806,588" fill="#376ee6"/><rect x="820" y="520" width="220" height="120" rx="22" fill="#f7f3ff" stroke="#dfe6ef"/><text x="930" y="568" text-anchor="middle" class="h" style="font-size:19px"><tspan x="930">全量 manifest</tspan><tspan x="930" dy="30">+ 超长 outline</tspan></text><path d="M 1040 580 C 1058 580, 1052 390, 1070 390" fill="none" stroke="#376ee6" stroke-width="5"/><polygon points="1070,390 1056,382 1056,398" fill="#376ee6"/><rect x="1070" y="330" width="220" height="120" rx="22" fill="#fff1f2" stroke="#dfe6ef"/><text x="1180" y="378" text-anchor="middle" class="h" style="font-size:19px"><tspan x="1180">Writer 同时</tspan><tspan x="1180" dy="30">裁决与写作</tspan></text><path d="M 1290 390 C 1308 390, 1302 580, 1320 580" fill="none" stroke="#376ee6" stroke-width="5"/><polygon points="1320,580 1306,572 1306,588" fill="#376ee6"/><rect x="1320" y="520" width="220" height="120" rx="22" fill="#f5f7fa" stroke="#dfe6ef"/><text x="1430" y="568" text-anchor="middle" class="h" style="font-size:19px"><tspan x="1430">Coverage 高</tspan><tspan x="1430" dy="30">可读性低</tspan></text><text x="90" y="790" class="b">共因：scope ratchet + 全量 carry-forward + single-pass finalization；validator 奖励 coverage，没有奖励 decision utility。</text></svg>