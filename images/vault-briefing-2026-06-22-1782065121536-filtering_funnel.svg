<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640">
<rect width="100%" height="100%" fill="#f8fafc"/>
<style>text{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Noto Sans SC,Arial,sans-serif;} .title{font-size:30px;font-weight:800;fill:#0f172a} .sub{font-size:16px;fill:#475569} .small{font-size:13px;fill:#64748b} .num{font-size:56px;font-weight:850;fill:#0f172a} .label{font-size:15px;font-weight:750;fill:#334155}</style>

<text x="44" y="58" class="title">过滤漏斗：从 path discovery 到正式纳入</text>
<text x="44" y="90" class="sub">正式纳入必须同时满足：仍存在、位于 vault 内、.md 后缀、路径不含 attachment、落在精确 24h 窗口。</text>
<g transform="translate(100,145)">
  <rect x="0" y="0" width="920" height="78" rx="22" fill="#dbeafe"/><text x="28" y="49" class="label">1. Spotlight/mdfind 枚举：21,021 个 Markdown path</text>
  <path d="M460 86 L420 132 H500 Z" fill="#94a3b8"/>
  <rect x="90" y="140" width="740" height="78" rx="22" fill="#e0f2fe"/><text x="118" y="189" class="label">2. 当前存在性过滤：删除/缺失路径不进入分析，stale count=5,724</text>
  <path d="M460 226 L420 272 H500 Z" fill="#94a3b8"/>
  <rect x="180" y="280" width="560" height="78" rx="22" fill="#fef3c7"/><text x="208" y="329" class="label">3. Attachment 路径硬排除 + precise timestamp window</text>
  <path d="M460 366 L420 412 H500 Z" fill="#94a3b8"/>
  <rect x="310" y="420" width="300" height="78" rx="22" fill="#dcfce7"/><text x="338" y="469" class="label">4. 正式 source table：0 行</text>
</g>
<text x="44" y="590" class="small">这张图支撑 source table 为空的原因：空不是采集失败，而是规则过滤后的结果。</text>

</svg>