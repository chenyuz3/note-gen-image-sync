<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640">
<rect width="100%" height="100%" fill="#f8fafc"/>
<style>text{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Noto Sans SC,Arial,sans-serif;} .title{font-size:30px;font-weight:800;fill:#0f172a} .sub{font-size:16px;fill:#475569} .small{font-size:13px;fill:#64748b} .num{font-size:52px;font-weight:850;fill:#0f172a} .label{font-size:15px;font-weight:700;fill:#334155}</style>

<text x="44" y="58" class="title">Source timeline：10:05 Intel → 20:00 BIS</text>
