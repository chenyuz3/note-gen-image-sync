<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="100%" height="100%" fill="#071526"/><defs><linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#4ea1ff"/><stop offset="1" stop-color="#37d4c7"/></linearGradient><linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#ffad66"/><stop offset="1" stop-color="#ff6f7d"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".28"/></filter></defs><text x="80" y="78" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="700" fill="#37d4c7" text-anchor="start" opacity="1">INFERENCE TAXONOMY</text><text x="80" y="140" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="52" font-weight="700" fill="#f4f7fb" text-anchor="start" opacity="1">LLM 推理瓶颈：从二分升级为四分</text><text x="80" y="186" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="400" fill="#a9bfd6" text-anchor="start" opacity="1">同一模型会随 stage、batch、precision、parallelism 与 memory tier 改变主导约束</text><line x1="80" y1="220" x2="1520" y2="220" stroke="#244665" stroke-width="2"/><rect x="80" y="275" width="700" height="205" rx="26" fill="#102b48" stroke="#4ea1ff" stroke-width="3" opacity="1"/><text x="115" y="330" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="750" fill="#4ea1ff" text-anchor="start" opacity="1">COMPUTE</text><text x="115" y="385" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="32" font-weight="650" fill="#f4f7fb" text-anchor="start" opacity="1">prefill / large batch</text><text x="115" y="429" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="24" font-weight="450" fill="#a9bfd6" text-anchor="start" opacity="1">MTP accepted / diffusion</text><rect x="820" y="275" width="700" height="205" rx="26" fill="#102b48" stroke="#37d4c7" stroke-width="3" opacity="1"/><text x="855" y="330" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="750" fill="#37d4c7" text-anchor="start" opacity="1">BANDWIDTH</text><text x="855" y="385" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="32" font-weight="650" fill="#f4f7fb" text-anchor="start" opacity="1">decode 默认</text><text x="855" y="429" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="24" font-weight="450" fill="#a9bfd6" text-anchor="start" opacity="1">权重 + KV cache 重读</text><rect x="80" y="520" width="700" height="205" rx="26" fill="#102b48" stroke="#ffad66" stroke-width="3" opacity="1"/><text x="115" y="575" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="750" fill="#ffad66" text-anchor="start" opacity="1">LATENCY</text><text x="115" y="630" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="32" font-weight="650" fill="#f4f7fb" text-anchor="start" opacity="1">低 batch / MoE</text><text x="115" y="674" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="24" font-weight="450" fill="#a9bfd6" text-anchor="start" opacity="1">小 collective + launch floor</text><rect x="820" y="520" width="700" height="205" rx="26" fill="#102b48" stroke="#9d8cff" stroke-width="3" opacity="1"/><text x="85