<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="100%" height="100%" fill="#071526"/><defs><linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#4ea1ff"/><stop offset="1" stop-color="#37d4c7"/></linearGradient><linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#ffad66"/><stop offset="1" stop-color="#ff6f7d"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".28"/></filter></defs><text x="80" y="78" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="700" fill="#37d4c7" text-anchor="start" opacity="1">SEMICONDUCTOR SIGNAL STACK</text><text x="80" y="140" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="52" font-weight="700" fill="#f4f7fb" text-anchor="start" opacity="1">半导体：基本面强，配置边际降温</text><text x="80" y="186" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="400" fill="#a9bfd6" text-anchor="start" opacity="1">同一时点把 earnings、channel pricing 与 ownership 放在一张图上</text><line x1="80" y1="220" x2="1520" y2="220" stroke="#244665" stroke-width="2"/><rect x="80" y="285" width="440" height="410" rx="30" fill="#102b48" stroke="#244665" stroke-width="2" opacity="1"/><text x="110" y="340" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="750" fill="#4ea1ff" text-anchor="start" opacity="1">经营 / CAPEX</text><text x="110" y="405" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="650" fill="#f4f7fb" text-anchor="start" opacity="1">TSMC 2026 capex</text><text x="300" y="510" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="48" font-weight="750" fill="#4ea1ff" text-anchor="middle" opacity="1">US$60–64bn</text><line x1="110" y1="555" x2="490" y2="555" stroke="#244665" stroke-width="2"/><text x="110" y="610" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="500" fill="#a9bfd6" text-anchor="start" opacity="1">2Q26 GM 67.7%</text><text x="110" y="650" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="600" fill="#f4f7fb" text-anchor="start" opacity="1">3Q26E 66.4%</text><rect x="570" y="285" width="440" height="410" rx="30" fill="#102b48" stroke="#244665" stroke-width="2" opacity="1"/><text x="600" y="340" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="750" fill="#63d5a8" text-anchor="start" opacity="1">价格 / CHANNEL</text><text x="600" y="405" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="650" fill="#f4f7fb" text-anchor="start" opacity="1">3Q26 DRAM ASP</text><text x="790" y="510" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="48" font-weight="750" fill="#63d5a8" text-anchor="middle" opacity="1">约 +21% QoQ</text><line x1="600" y1="555" x2="980" y2="555" stroke="#244665" stroke-width="2"/><text x="600" y="610" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="500" fill="#a9bfd6" text-anchor="start" opacity="1">server DRAM</text><text x="600" y="650" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="600" fill="#f4f7fb" text-anchor="start" opacity="1">+20–30% QoQ</text><rect x="1060" y="285" width="440" height="410" rx="30" fill="#102b48" stroke="#244665" stroke-width="2" opacity="1"/><text x="1090" y="340" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="750" fill="#ffad66" text-anchor="start" opacity="1">仓位 / POSITIONING</text><text x="1090" y="405" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="650" fill="#f4f7fb" text-anchor="start" opacity="1">Semis relative weight</text><text x="1280" y="510" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="48" font-weight="750" fill="#ffad66" text-anchor="middle" opacity="1">1.12x → 1.08x</text><line x1="1090" y1="555" x2="1470" y2="555" stroke="#244665" stroke-width="2"/><text x="1090" y="610" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="500" fill="#a9bfd6" text-anchor="start" opacity="1">仍超配</text><text x="1090" y="650" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="600" fill="#f4f7fb" text-anchor="start" opacity="1">但边际收窄</text><text x="80" y="785" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="750" fill="#63d5a8" text-anchor="start" opacity="1">FACT</text><text x="148" y="785" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="450" fill="#a9bfd6" text-anchor="start" opacity="1">数值来自窗口内处理稿；来源口径不等于可直接外推的投资结论。</text><text x="80" y="835" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="750" fill="#4ea1ff" text-anchor="start" opacity="1">LOGIC</text><text x="160" y="835" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="500" fill="#f4f7fb" text-anchor="start" opacity="1">基本面与 crowding 可短期脱钩；后续需并列跟踪价格实现、capex 转化、margin 与 positioning。</text></svg>