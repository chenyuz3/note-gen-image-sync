<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="100%" height="100%" fill="#fbfbfd"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef5ff"/><stop offset="1" stop-color="#f8f1ff"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#334155" flood-opacity="0.14"/></filter>
  </defs>
  <rect x="34" y="34" width="1132" height="632" rx="30" fill="url(#g)" filter="url(#shadow)"/>
  <text x="70" y="95" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#172033">Research scientist hiring mechanism / 研究岗求职机制</text>
  
<text x="70" y="145" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="22" fill="#475569">Yong Zheng-Xin 的边际信息：研究岗求职不是论文数量最大化，而是“可信门槛 + 团队即时问题求解 + timing”。</text>
<g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial" font-size="22">
  <rect x="92" y="235" width="210" height="110" rx="22" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="197" y="280" text-anchor="middle" font-weight="800" fill="#1e3a8a">1–2 篇关键论文</text><text x="197" y="316" text-anchor="middle" fill="#1e40af">门槛 / deep dive</text>
  <path d="M310 290 H450" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="455" y="235" width="230" height="110" rx="22" fill="#dcfce7" stroke="#22c55e"/>
  <text x="570" y="280" text-anchor="middle" font-weight="800" fill="#166534">现场解决问题</text><text x="570" y="316" text-anchor="middle" fill="#166534">系统设计 / 并行 / agents</text>
  <path d="M692 290 H830" stroke="#64748b" stroke-width="5"/>
  <rect x="835" y="235" width="230" height="110" rx="22" fill="#ffedd5" stroke="#f97316"/>
  <text x="950" y="280" text-anchor="middle" font-weight="800" fill="#9a3412">工作试用</text><text x="950" y="316" text-anchor="middle" fill="#9a3412">最高可达 1 周</text>
  <rect x="250" y="455" width="700" height="88" rx="22" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="600" y="493" text-anchor="middle" font-size="25" font-weight="800" fill="#92400e">Timing / headcount / exploding offer</text>
  <text x="600" y="526" text-anchor="middle" font-size="19" fill="#92400e">窗口可能短于 1 个月；开始面试后轮次间隔通常很短</text>
</g>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>

</svg>