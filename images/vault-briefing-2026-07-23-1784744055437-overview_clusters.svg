<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850"><rect width="1200" height="850" fill="#f7f8fa"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial,sans-serif;fill:#172033}.t{font-size:34px;font-weight:700}.sub{font-size:18px;fill:#607086}.n{font-size:46px;font-weight:760}.l{font-size:19px;font-weight:650}.s{font-size:15px;fill:#607086}</style><text x="60" y="62" class="t">9 个主题 cluster：文件集中度与独立结论分开看</text><text x="60" y="96" class="sub">推理稿与 3D 项目各占 5 篇，但分别是一组章节模块和一条 V1→V5 revision chain。</text><text x="60" y="155" class="l">LLM inference / cache / MTP</text><rect x="420" y="130" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="130" width="690.0" height="36" rx="10" fill="#4f8795"/><text x="1130" y="155" class="l">5</text><text x="60" y="225" class="l">3D-print workflow</text><rect x="420" y="200" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="200" width="690.0" height="36" rx="10" fill="#729b73"/><text x="1130" y="225" class="l">5</text><text x="60" y="295" class="l">Enterprise agent / adoption</text><rect x="420" y="270" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="270" width="414.0" height="36" rx="10" fill="#806fa4"/><text x="1130" y="295" class="l">3</text><text x="60" y="365" class="l">Memory / HBM / market</text><rect x="420" y="340" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="340" width="414.0" height="36" rx="10" fill="#b58a50"/><text x="1130" y="365" class="l">3</text><text x="60" y="435" class="l">WFE / advanced packaging</text><rect x="420" y="410" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="410" width="414.0" height="36" rx="10" fill="#5f8fb8"/><text x="1130" y="435" class="l">3</text><text x="60" y="505" class="l">NVIDIA rack / network</text><rect x="420" y="480" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="480" width="276.0" height="36" rx="10" fill="#607fa9"/><text x="1130" y="505" class="l">2</text><text x="60" y="575" class="l">Personal context / Dayflow</text><rect x="420" y="550" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="550" width="276.0" height="36" rx="10" fill="#ae7389"/><text x="1130" y="575" class="l">2</text><text x="60" y="645" class="l">HDD / AI storage</text><rect x="420" y="620" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="620" width="138.0" height="36" rx="10" fill="#8e9a68"/><text x="1130" y="645" class="l">1</text><text x="60" y="715" class="l">Neocloud economics</text><rect x="420" y="690" width="690" height="36" rx="10" fill="#e9edf2"/><rect x="420" y="690" width="138.0" height="36" rx="10" fill="#8a98a8"/><text x="1130" y="715" class="l">1</text><rect x="60" y="790" width="1050" height="42" rx="14" fill="#fff2df"/><text x="80" y="818" class="s">路径数量反映工作密度，不等于 25 条独立 thesis；本期真正新增约 15 条可区分的事实、模型修正或 workflow gate。</text></svg>