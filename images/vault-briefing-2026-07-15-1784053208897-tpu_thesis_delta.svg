<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="930" viewBox="0 0 1500 930">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="64" y="72" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="40" font-weight="700" fill="#182230">TPU / Broadcom：新材料强化“渐进分流”，不是终局定论</text>
<text x="64" y="116" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="22" fill="#667085">相对 6 月旧压力测试，新增的是更明确的执行条件与证伪清单</text>
<rect x="64" y="165" width="660" height="520" rx="24" fill="#f8fafc" stroke="#e4e7ec"/>
<rect x="64" y="165" width="9" height="520" rx="5" fill="#2f7d6d"/>
<text x="98" y="213" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="27" font-weight="700" fill="#182230">支持 Broadcom 仍占主导的证据</text>
<rect x="534" y="185" width="156" height="38" rx="19" fill="#2f7d6d22"/>
<text x="612" y="211" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="18" font-weight="700" fill="#2f7d6d">Higher confidence</text>
<circle cx="102" cy="250" r="5" fill="#2f7d6d"/>
<text x="118" y="257" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">Google LTA：未来四代 TPU + 网络组件至 2031</text>
<circle cx="102" cy="292" r="5" fill="#2f7d6d"/>
<text x="118" y="299" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">既有平台跨芯片、HBM、封装、系统认证的切换门槛高</text>
<circle cx="102" cy="334" r="5" fill="#2f7d6d"/>
<text x="118" y="341" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">Broadcom 已锁定 HBM；MediaTek 的成本优势并非确定</text>
<circle cx="102" cy="376" r="5" fill="#2f7d6d"/>
<text x="118" y="383" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">MediaTek 长期目标约 15–20%，与第二供应源叙事一致</text>
<circle cx="102" cy="418" r="5" fill="#2f7d6d"/>
<text x="118" y="425" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">新客户放量可降低 AVGO 对单一 TPU 客户的收入集中</text>
<rect x="776" y="165" width="660" height="520" rx="24" fill="#f8fafc" stroke="#e4e7ec"/>
<rect x="776" y="165" width="9" height="520" rx="5" fill="#c97a4a"/>
<text x="810" y="213" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="27" font-weight="700" fill="#182230">必须保留的反方与证伪条件</text>
<rect x="1246" y="185" width="156" height="38" rx="19" fill="#c97a4a22"/>
<text x="1324" y="211" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="18" font-weight="700" fill="#c97a4a">Medium confidence</text>
<circle cx="814" cy="250" r="5" fill="#c97a4a"/>
<text x="830" y="257" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">Google 有明确的降成本与供应商多元化激励</text>
<circle cx="814" cy="292" r="5" fill="#c97a4a"/>
<text x="830" y="299" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">若 MediaTek 性能显著超预期，份额路径会重估</text>
<circle cx="814" cy="334" r="5" fill="#c97a4a"/>
<text x="830" y="341" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">HBM 供应、EMIB 可靠性与 2nm 量产仍是关键节点</text>
<circle cx="814" cy="376" r="5" fill="#c97a4a"/>
<text x="830" y="383" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">TPUv8 相对 Rubin 的代际竞争力尚未完全验证</text>
<circle cx="814" cy="418" r="5" fill="#c97a4a"/>
<text x="830" y="425" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">单位份额与收入份额不可混用，低定价会改变读数</text>
<rect x="230" y="735" width="1040" height="110" rx="26" fill="#f2f4f7"/>
<text x="750" y="778" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="25" font-weight="700" fill="#182230">边际结论</text>
<text x="750" y="816" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Arial,sans-serif" font-size="21" fill="#475467">“MediaTek 会参与”与“Broadcom 会被颠覆”不是同一命题；当前材料更支持 80/20 附近的渐进分流。</text>
</svg>