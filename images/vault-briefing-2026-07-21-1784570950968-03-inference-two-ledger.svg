<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" rx="28" fill="#f7f9fc"/>
<style>.t{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC',sans-serif;fill:#172033}.m{fill:#6b7a90}.b{font-weight:700}.s{font-size:20px}.xs{font-size:16px}.mono{font-family:'SFMono-Regular',Menlo,monospace}</style>
<text x="60" y="70" class="t b" font-size="32">同一个模型，三段账要分别算</text>
<text x="60" y="104" class="t m xs">先比较计算时间 FLOPs / compute 与搬运时间 bytes / bandwidth，再判断瓶颈</text>
<g transform="translate(55 145)"><rect width="350" height="430" rx="24" fill="#eef4ff" stroke="#cadbfb"/><text x="28" y="48" class="t b" font-size="26">Prefill · 权重 GEMM</text><text x="28" y="88" class="t s">一批 S 个 token 共享一次权重读取</text><rect x="28" y="120" width="294" height="78" rx="14" fill="#fff"/><text x="48" y="150" class="t mono xs">F ≈ 2PS</text><text x="48" y="178" class="t mono xs">AI ≈ 2S / b_w</text><text x="28" y="242" class="t b s" fill="#416fd9">S 上升 → 权重复用提高</text><text x="28" y="278" class="t xs">52B 教学模型 / H100：约 295 tokens</text><text x="28" y="304" class="t xs">是权重 GEMM 的理论翻转点。</text><text x="28" y="350" class="t m xs">Attention core 仍需另加 O(S²d)，</text><text x="28" y="376" class="t m xs">长 prompt 下不可忽略。</text></g>
<g transform="translate(425 145)"><rect width="350" height="430" rx="24" fill="#eef9f4" stroke="#c9e6d7"/><text x="28" y="48" class="t b" font-size="26">Decode · 权重 / FFN</text><text x="28" y="88" class="t s">每生成 1 个 token 重读 active weights</text><rect x="28" y="120" width="294" height="78" rx="14" fill="#fff"/><text x="48" y="150" class="t mono xs">F ≈ 2P_active</text><text x="48" y="178" class="t mono xs">AI ≈ 2 / b_w</text><text x="28" y="242" class="t b s" fill="#338865">低 batch 通常在带宽侧</text><text x="28" y="278" class="t xs">BF16 教学口径约 1 FLOP/byte，</text><text x="28" y="304" class="t xs">远低于现代 accelerator 脊点。</text><text x="28" y="350" class="t m xs">MoE 还可能增加小包通信与</text><text x="28" y="376" class="t m xs">exposed latency。</text></g>
<g transform="translate(795 145)"><rect width="350" height="430" rx="24" fill="#fff5ea" stroke="#efd7bb"/><text x="28" y="48" class="t b" font-size="26">Decode · Attention core</text><text x="28" y="88" class="t s">当前 Q 读取全部历史 KV</text><rect x="28" y="120" width="294" height="78" rx="14" fill="#fff"/><text x="48" y="150" class="t mono xs">F ≈ 4dT</text><text x="48" y="178" class="t mono xs">KV bytes ≈ 4dT</text><text x="28" y="242" class="t b s" fill="#c5752d">FLOPs 大 ≠ compute-bound</text><text x="28" y="278" class="t xs">T 增长时 FLOPs 与 KV bytes 同步增长；</text><text x="28" y="304" class="t xs">MHA 理论 AI 仍约 1 FLOP/byte。</text><text x="28" y="350" class="t m xs">约 49K 是 FLOPs 追平点，</text><text x="28" y="376" class="t m xs">不是 Roofline 翻转点。</text></g>
<path d="M220 625 H980" stroke="#b8c4d4" stroke-width="3" stroke-dasharray="10 10"/>
<circle cx="220" cy="625" r="10" fill="#4c79e6"/><circle cx="600" cy="625" r="10" fill="#3d9a76"/><circle cx="980" cy="625" r="10" fill="#dd8b43"/>
<rect x="120" y="660" width="960" height="64" rx="16" fill="#fff" stroke="#dce4ef"/>
<text x="145" y="690" class="t s"><tspan class="b">MTP / speculative decode：</tspan>收益取决于 acceptance、batch 与 concurrency；它会右移算术强度，</text>
<text x="145" y="714" class="t s">但不是天然 compute-bound。</text>
</svg>