<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">24 小时候选审计概览</title><desc id="desc">24 小时候选审计概览</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#162033}.t{font-size:42px;font-weight:700}.s{font-size:22px;fill:#65758b}.k{font-size:72px;font-weight:760}.h{font-size:26px;font-weight:700}.b{font-size:22px}.sm{font-size:18px;fill:#65758b}</style><text x="90" y="105" class="t">24 小时变更审计：总量很大，新增很少</text><text x="90" y="150" class="s">2026-07-18 02:00 → 2026-07-19 02:00 SGT · precise filesystem window</text>
<rect x="90" y="215" width="430" height="230" rx="26" fill="#f5f7fa"/><text x="130" y="305" class="k" fill="#376ee6">129</text><text x="130" y="360" class="h">现存 Markdown 候选</text><text x="130" y="402" class="s">全部位于 ※INBOX；Attachment 路径硬排除</text>
<rect x="585" y="215" width="430" height="230" rx="26" fill="#eff5ff"/><text x="625" y="305" class="k" fill="#3f9b73">3</text><text x="625" y="360" class="h">新增文件</text><text x="625" y="402" class="s">2 份 workflow 审计 + 1 份中文报告</text>
<rect x="1080" y="215" width="430" height="230" rx="26" fill="#fff5eb"/><text x="1120" y="305" class="k" fill="#e78a3a">126</text><text x="1120" y="360" class="h">修改既有文件</text><text x="1120" y="402" class="s">全部集中在同一分钟，按 bulk touch 处理</text>
<text x="90" y="545" class="h">审计解读</text><line x1="90" y1="575" x2="1510" y2="575" stroke="#dfe6ef" stroke-width="2"/><text x="90" y="635" class="b">• 文件数反映两个研究项目的 workflow fan-out，不等于 129 个独立观点。</text><text x="90" y="690" class="b">• 无 before snapshot 时，126 个同分钟 mtime 只能标记为 diff unknown。</text><text x="90" y="745" class="b">• 本日报的实质新增集中在两份审计笔记及新生成的中文报告。</text><text x="90" y="820" class="sm">Miyo date-level cross-check：0 条；披露为 index/date-filter gap，不反向删除 filesystem 候选。</text></svg>