<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Research Plane 与 Editorial Plane 的分层架构</title><desc id="desc">Research Plane 与 Editorial Plane 的分层架构</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#162033}.t{font-size:42px;font-weight:700}.s{font-size:22px;fill:#65758b}.k{font-size:72px;font-weight:760}.h{font-size:26px;font-weight:700}.b{font-size:22px}.sm{font-size:18px;fill:#65758b}</style><text x="90" y="105" class="t">改造方向：把 Research Plane 与 Editorial Plane 分开</text><text x="90" y="150" class="s">主报告只承载最小充分证据；深度留在可复核 appendix</text><rect x="90" y="235" width="300" height="120" rx="24" fill="#eff5ff" stroke="#dfe6ef"/><text x="240" y="290" text-anchor="middle" class="h" style="font-size:22px">Report Contract</text><text x="240" y="323" text-anchor="middle" class="sm">01</text><path d="M 390 295 H 445" stroke="#376ee6" stroke-width="5"/><polygon points="445,295 431,287 431,303" fill="#376ee6"/><rect x="460" y="235" width="300" height="120" rx="24" fill="#eef8f3" stroke="#dfe6ef"/><text x="610" y="290" text-anchor="middle" class="h" style="font-size:22px">Evidence Cards</text><text x="610" y="323" text-anchor="middle" class="sm">02</text><path d="M 760 295 H 815" stroke="#376ee6" stroke-width="5"/><polygon points="815,295 801,287 801,303" fill="#376ee6"/><rect x="830" y="235" width="300" height="120" rx="24" fill="#eef8f3" stroke="#dfe6ef"/><text x="980" y="290" text-anchor="middle" class="h" style="font-size:22px">Canonical Claim Ledger</text><text x="980" y="323" text-anchor="middle" class="sm">03</text><path d="M 1130 295 H 1185" stroke="#376ee6" stroke-width="5"/><polygon points="1185,295 1171,287 1171,303" fill="#376ee6"/><rect x="1200" y="235" width="300" height="120" rx="24" fill="#f7f3ff" stroke="#dfe6ef"/><text x="1350" y="290" text-anchor="middle" class="h" style="font-size:22px">Thesis Editor</text><text x="1350" y="323" text-anchor="middle" class="sm">04</text><path d="M 1350 355 V 410 H 240 V 500" stroke="#376ee6" stroke-width="5" fill="none"/><polygon points="240,505 232,491 248,491" fill="#376ee6"/><rect x="90" y="505" width="300" height="120" rx="24" fill="#fff5eb" stroke="#dfe6ef"/><text x="240" y="560" text-anchor="middle" class="h" style="font-size:22px">Structural Draft</text><text x="240" y="593" text-anchor="middle" class="sm">05</text><path d="M 390 565 H 445" stroke="#376ee6" stroke-width="5"/><polygon points="445,565 431,557 431,573" fill="#376ee6"/><rect x="460" y="505" width="300" height="120" rx="24" fill="#fff1f2" stroke="#dfe6ef"/><text x="610" y="560" text-anchor="middle" class="h" style="font-size:22px">Technical Audit</text><text x="610" y="593" text-anchor="middle" class="sm">06</text><path d="M 760 565 H 815" stroke="#376ee6" stroke-width="5"/><polygon points="815,565 801,557 801,573" fill="#376ee6"/><rect x="830" y="505" width="300" height="120" rx="24" fill="#f7f3ff" stroke="#dfe6ef"/><text x="980" y="560" text-anchor="middle" class="h" style="font-size:22px">Line Edit</text><text x="980" y="593" text-anchor="middle" class="sm">07</text><path d="M 1130 565 H 1185" stroke="#376ee6" stroke-width="5"/><polygon points="1185,565 1171,557 1171,573" fill="#376ee6"/><rect x="1200" y="505" width="300" height="120" rx="24" fill="#eef8f3" stroke="#dfe6ef"/><text x="1350" y="560" text-anchor="middle" class="h" style="font-size:22px">Executive Report + Appendix</text><text x="1350" y="593" text-anchor="middle" class="sm">08</text><rect x="90" y="770" width="1420" height="68" rx="18" fill="#f5f7fa"/><text x="125" y="813" class="b">优先修复：交付判型、收敛 gate、结构编辑、技术审计、逐行编辑与用户结果型 validator。</text></svg>