low / low-signal</text><rect x="430" y="639" width="700" height="34" rx="10" fill="#e9edf2"/><rect x="430" y="639" width="140.0" height="34" rx="10" fill="#9aa3ad"/><text x="1143" y="663" class="label">2</text><text x="60" y="735" class="label">Payments / quarterly setup</text><rect x="430" y="711" width="700" height="34" rx="10" fill="#e9edf2"/><rect x="430" y="711" width="70.0" height="34" rx="10" fill="#c19b55"/><text x="1143" y="735" class="label">1</text><text x="60" y="807" class="label">Periodic market context</text><rect x="430" y="783" width="700" height="34" rx="10" fill="#e9edf2"/><rect x="430" y="783" width="70.0" height="34" rx="10" fill="#8798c7"/><text x="1143" y="807" class="label">1</text><rect x="60" y="855" width="1070" height="42" rx="14" fill="#fff2df"/><text x="80" y="883" class="small">条件性结论：按文件数，项目 cluster 最大；按独立 thesis 增量，推理系统、AI infra 与 agent safety 的边际更高。</text></svg>