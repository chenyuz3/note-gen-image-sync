<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="100%" height="100%" fill="#071526"/><defs><linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#4ea1ff"/><stop offset="1" stop-color="#37d4c7"/></linearGradient><linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#ffad66"/><stop offset="1" stop-color="#ff6f7d"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".28"/></filter></defs><text x="80" y="78" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="700" fill="#37d4c7" text-anchor="start" opacity="1">MACRO / FLOW</text><text x="80" y="140" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="52" font-weight="700" fill="#f4f7fb" text-anchor="start" opacity="1">去杠杆：路径仍在，长期供需是另一时钟</text><text x="80" y="186" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="25" font-weight="400" fill="#a9bfd6" text-anchor="start" opacity="1">AUM 变化包含价格、daily reset、rebalancing 与资金流，不能当成纯赎回</text><line x1="80" y1="220" x2="1520" y2="220" stroke="#244665" stroke-width="2"/><rect x="80" y="285" width="650" height="355" rx="30" fill="#102b48" stroke="#244665" stroke-width="2" opacity="1"/><text x="115" y="345" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="21" font-weight="750" fill="#37d4c7" text-anchor="start" opacity="1">LEVERAGED ETF AUM</text><text x="160" y="455" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="66" font-weight="750" fill="#ff6f7d" text-anchor="start" opacity="1">−34%</text><text x="160" y="505" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="500" fill="#a9bfd6" text-anchor="start" opacity="1">memory equity ETF</text><text x="515" y="455" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="66" font-weight="750" fill="#ffad66" text-anchor="middle" opacity="1">−13%</text><text x="515" y="505" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="500" fill="#a9bfd6" text-anchor="middle" opacity="1">all leveraged equity ETF</text><line x1="115" y1="552" x2="695" y2="552" stroke="#244665" stroke-width="2"/><text x="115" y="598" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="500" fill="#f4f7fb" text-anchor="start" opacity="1">自 6 月峰值</text><rect x="780" y="285" width="740" height="355" rx="30" fill="#102b48" stroke="#244665" stroke-width="2" opacity="1"/><text x="815" y="345" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="21" font-weight="750" fill="#9d8cff" text-anchor="start" opacity="1">RETAIL CALL PROXY</text><text x="895" y="455" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="58" font-weight="750" fill="#ffad66" text-anchor="start" opacity="1">14mn</text><text x="1080" y="455" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="48" font-weight="600" fill="#a9bfd6" text-anchor="middle" opacity="1">→</text><text x="1260" y="455" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="58" font-weight="750" fill="#63d5a8" text-anchor="middle" opacity="1">8mn</text><text x="815" y="515" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="450" fill="#a9bfd6" text-anchor="start" opacity="1">此前峰值</text><text x="1260" y="515" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="20" font-weight="450" fill="#a9bfd6" text-anchor="middle" opacity="1">最新值</text><line x1="815" y1="555" x2="1485" y2="555" stroke="#244665" stroke-width="2"/><text x="815" y="603" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="21" font-weight="500" fill="#f4f7fb" text-anchor="start" opacity="1">报告定义的 capitulation 区间：2–4mn</text><rect x="80" y="695" width="1440" height="120" rx="24" fill="#0d2138" stroke="#244665" stroke-width="2" opacity="1"/><text x="115" y="745" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="750" fill="#ffad66" text-anchor="start" opacity="1">OPINION</text><text x="220" y="745" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="520" fill="#f4f7fb" text-anchor="start" opacity="1">“约 3 个月恢复正常化”是 JPM 情景判断，不是图表直接测量。</text><text x="115" y="790" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="18" font-weight="750" fill="#4ea1ff" text-anchor="start" opacity="1">IMPLICATION</text><text x="250" y="790" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="500" fill="#a9bfd6" text-anchor="start" opacity="1">短期去杠杆与长期正向供需可以同时成立，关键在时间尺度。</text></svg>