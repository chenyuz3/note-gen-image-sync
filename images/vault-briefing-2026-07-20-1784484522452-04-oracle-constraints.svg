<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Oracle Project Jupiter 双重许可约束</title><desc id="desc">Oracle Project Jupiter 双重许可约束</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.t{font-size:42px;font-weight:760}.s{font-size:22px;fill:#64748b}.k{font-size:72px;font-weight:780}.h{font-size:27px;font-weight:720}.b{font-size:22px}.sm{font-size:18px;fill:#64748b}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px}</style><text x="90" y="105" class="t">Oracle Project Jupiter：两个独立许可约束同时存在</text><text x="90" y="150" class="s">来源笔记整理 SemiAnalysis 线程；1–2 年延误是作者判断，不是官方确认</text>
<rect x="90" y="225" width="630" height="210" rx="28" fill="#fff5eb"/><text x="130" y="290" class="h">天然气接入</text><text x="130" y="340" class="b">17 英里 Green Chile Pipeline 尚无获批路线</text><text x="130" y="385" class="b">规划容量：2.45 GW；合同投运日临近</text>
<rect x="880" y="225" width="630" height="210" rx="28" fill="#fff1f2"/><text x="920" y="290" class="h">发电设施许可</text><text x="920" y="340" class="b">Bloom Energy 燃料电池仍待空气许可证</text><text x="920" y="385" class="b">已要求公开听证，日期未定</text>
<path d="M720 330 H855" stroke="#cb5360" stroke-width="6" stroke-dasharray="14 10"/><text x="770" y="305" class="sm">独立约束</text>
<text x="90" y="535" class="h">四条替代路径的量级约束</text>
<g><rect x="90" y="575" width="330" height="140" rx="22" fill="#f5f7fa"/><text x="120" y="625" class="h" style="font-size:21px">Blanket certificate</text><text x="120" y="670" class="b">转入完整 Section 7</text></g>
<g><rect x="460" y="575" width="330" height="140" rx="22" fill="#f5f7fa"/><text x="490" y="625" class="h" style="font-size:21px">Hinshaw exemption</text><text x="490" y="670" class="b">管道公司已排除</text></g>
<g><rect x="830" y="575" width="330" height="140" rx="22" fill="#f5f7fa"/><text x="860" y="625" class="h" style="font-size:21px">替代路线</text><text x="860" y="670" class="b">通行权 / 勘测未解决</text></g>
<g><rect x="1200" y="575" width="310" height="140" rx="22" fill="#f5f7fa"/><text x="1230" y="625" class="h" style="font-size:21px">CNG 虚拟管道</text><text x="1230" y="670" class="b">100–200 MW ≪ 2.45 GW</text></g>
<rect x="90" y="785" width="1420" height="58" rx="18" fill="#fff5eb"/><text x="125" y="824" class="b">Implication：瓶颈来自基础设施与许可耦合；改发电设备没有消除对管道天然气的依赖。</text></svg>