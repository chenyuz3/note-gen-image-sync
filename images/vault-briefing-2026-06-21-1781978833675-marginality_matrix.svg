<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640">
<rect width="100%" height="100%" fill="#f8fafc"/>
<style>text{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Noto Sans SC,Arial,sans-serif;} .title{font-size:30px;font-weight:800;fill:#0f172a} .sub{font-size:16px;fill:#475569} .small{font-size:13px;fill:#64748b} .num{font-size:52px;font-weight:850;fill:#0f172a} .label{font-size:15px;font-weight:700;fill:#334155}</style>

<text x="44" y="58" class="title">边际新增矩阵：Facts / Logic / Opinion</text>
<text x="44" y="90" class="sub">将两篇 note 按信息性质拆开，避免把来源观点直接当成结论。</text>
<g transform="translate(54,135)">
  <rect x="0" y="0" width="320" height="360" rx="24" fill="#fff" stroke="#e5e7eb"/>
  <text x="24" y="44" class="label">Facts</text>
  <text x="24" y="92" class="small">BIS FAQ 日期：2026-06-17</text>
  <text x="24" y="122" class="small">覆盖：3A090 / 4A090 / .z items</text>
  <text x="24" y="152" class="small">Intel note：CEO 访谈，CPU:GPU 比例叙述</text>
  <text x="24" y="182" class="small">窗口内：2 篇均为新增</text>
  <rect x="360" y="0" width="320" height="360" rx="24" fill="#fff" stroke="#e5e7eb"/>
  <text x="384" y="44" class="label">Logic</text>
  <text x="384" y="92" class="small">BIS：封堵通过 ECCN 拆分绕行</text>
  <text x="384" y="122" class="small">Intel：文化/资产负债表/产品/Foundry</text>
  <text x="384" y="152" class="small">共同：控制层从单点扩展到系统</text>
  <text x="384" y="182" class="small">连接旧笔记：政策链 + 转型链</text>
  <rect x="720" y="0" width="320" height="360" rx="24" fill="#fff" stroke="#e5e7eb"/>
  <text x="744" y="44" class="label">Opinion / judgment</text>
  <text x="744" y="92" class="small">BIS 解读：合规负担更穿透</text>
  <text x="744" y="122" class="small">Lip-Bu Tan：Intel 仍有 5-10 年目标</text>
  <text x="744" y="152" class="small">本页判断：跟踪执行指标，不作买卖建议</text>
  <text x="744" y="182" class="small">确信度：BIS 高；Intel 转型中</text>
</g>
<text x="44" y="590" class="small">这张图支撑正文的方法论：Facts 与来源 opinion 分层展示，implication 不越界到投资建议。</text>

</svg>