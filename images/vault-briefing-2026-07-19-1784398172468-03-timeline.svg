<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">变更时间线与 bulk touch</title><desc id="desc">变更时间线与 bulk touch</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#162033}.t{font-size:42px;font-weight:700}.s{font-size:22px;fill:#65758b}.k{font-size:72px;font-weight:760}.h{font-size:26px;font-weight:700}.b{font-size:22px}.sm{font-size:18px;fill:#65758b}</style><text x="90" y="105" class="t">修改时间线显示单一 bulk-touch 峰值</text><text x="90" y="150" class="s">126 篇 modified_existing 的 mtime 均落在 2026-07-18 23:19 SGT</text>
