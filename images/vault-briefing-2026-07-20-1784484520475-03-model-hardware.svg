<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">模型×硬件推理瓶颈三分框架</title><desc id="desc">模型×硬件推理瓶颈三分框架</desc><rect width="1600" height="900" fill="#ffffff"/><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.t{font-size:42px;font-weight:760}.s{font-size:22px;fill:#64748b}.k{font-size:72px;font-weight:780}.h{font-size:27px;font-weight:720}.b{font-size:22px}.sm{font-size:18px;fill:#64748b}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px}</style><text x="90" y="105" class="t">模型 × 硬件的两本账：瓶颈按阶段与环节判定</text><text x="90" y="150" class="s">当前成稿把“多数情况下 bandwidth-bound”收窄为可审计的三分框架</text>
<rect x="90" y="220" width="410" height="180" rx="26" fill="#eff5ff"/><text x="130" y="280" class="h">Prefill</text><text x="130" y="325" class="b">一批 token 共享权重读取</text><text x="130" y="365" class="b">AI 数百—数千 → compute-bound</text>
<rect x="595" y="220" width="410" height="180" rx="26" fill="#eef8f3"/><text x="635" y="280" class="h">Decode · Attention / FFN</text><text x="635" y="325" class="b">AI ~1–2 ops/byte</text><text x="635" y="365" class="b">远低于 H100 FP8 脊点 ~590</text>
<rect x="1100" y="220" width="410" height="180" rx="26" fill="#fff5eb"/><text x="1140" y="280" class="h">MoE · low batch</text><text x="1140" y="325" class="b">小包 All-to-All 高频串行</text><text x="1140" y="365" class="b">带宽之外还有 exposed latency</text>
<path d="M500 310 H570" stroke="#376ee6" stroke-width="6"/><polygon points="570,310 552,300 552,320" fill="#376ee6"/><path d="M1005 310 H1075" stroke="#376ee6" stroke-width="6"/><polygon points="1075,310 1057,300 1057,320" fill="#376ee6"/>
<rect x="90" y="500" width="660" height="250" rx="28" fill="#f5f7fa"/><text x="130" y="565" class="h">判定公式</text><text x="130" y="625" class="mono">T = max(FLOPs ÷ compute, bytes ÷ bandwidth)</text><text x="130" y="680" class="b">谁更慢，就等谁；真实集群的 scheduling / overlap</text><text x="130" y="720" class="b">改变“等多久”，不自动改变“等谁”。</text>
<rect x="850" y="500" width="660" height="250" rx="28" fill="#f7f3ff"/><text x="890" y="565" class="h">MTP 的边界</text><text x="890" y="625" class="b">一次 forward 验证多个 token，等效 AI 右移。</text><text x="890" y="670" class="b">单序列通常仍在带宽侧；大 batch 过脊点后，</text><text x="890" y="715" class="b">验证 FLOPs 才会成为净成本。</text>
<text x="90" y="840" class="sm">Facts / Logic 来自当前研究成稿与一手 spec 复核；属于方法论与技术结论，不构成投资建议。</text></svg>