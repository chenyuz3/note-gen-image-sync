<svg version="1.1" width="100%" height="100%" viewBox="0 0 657 99" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><style type="text/css" /><defs><clipPath id="clip001"><path d="M0,0 L656.6367,0 L656.6367,98.22391 L0,98.22391 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip002"><path d="M0,0 L1816,0 L1816,273.3333 L0,273.3333 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip003"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,272 L1.333333,272 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip004"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,38.66667 L1.333333,38.66667 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip005"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,272 L1.333333,272 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip006"><path d="M1.333333,40 L1814.667,40 L1814.667,77.33334 L1.333333,77.33334 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip007"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,272 L1.333333,272 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip008"><path d="M1.333333,78.66666 L1814.667,78.66666 L1814.667,116 L1.333333,116 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip009"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,272 L1.333333,272 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip010"><path d="M1.333333,117.3333 L1814.667,117.3333 L1814.667,154.6667 L1.333333,154.6667 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip011"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,272 L1.333333,272 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip012"><path d="M1.333333,156 L1814.667,156 L1814.667,193.3333 L1.333333,193.3333 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip013"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,272 L1.333333,272 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip014"><path d="M1.333333,194.6667 L1814.667,194.6667 L1814.667,232 L1.333333,232 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip015"><path d="M1.333333,1.333333 L1814.667,1.333333 L1814.667,272 L1.333333,272 Z" clip-rule="evenodd" /></clipPath><clipPath id="clip016"><path d="M1.333333,233.3333 L1814.667,233.3333 L1814.667,270.6667 L1.333333,270.6667 Z" clip-rule="evenodd" /></clipPath></defs><clipPath id="page-clip-path-1"><rect x="0" y="0" width="657.33" height="98.67" /></clipPath><g clip-path="url(#page-clip-path-1)"><g><g clip-path="url(#clip001)"><g><g transform="matrix(0.361584,0,0,0.3593557,0,0)" clip-path="url(#clip002)"><g><g><g clip-path="url(#clip003)"><g><path d="M0,0 L1814.667,0 L1814.667,40 L0,40 Z" fill="#012169" fill-rule="evenodd" /></g></g><g clip-path="url(#clip004)"><g><g transform="translate(85.33334,29.53867)"><text><tspan x="0" y="0" font-family="Connections Cond Bld,Arial Narrow" font-weight="normal" font-style="normal" font-size="24" fill="#ffffff">Design Nuances</tspan></text></g></g><g><g transform="translate(374.6667,29.53867)"><text><tspan x="0" y="0" font-family="Connections Cond Bld,Arial Narrow" font-weight="normal" font-style="normal" font-size="24" fill="#ffffff">MV-rated SiC power devices &lt;5kW blocking voltage</tspan></text></g></g><g><g transform="translate(1125.333,29.53867)"><text><tspan x="0" y="0" font-family="Connections Cond Bld,Arial Narrow" font-weight="normal" font-style="normal" font-size="24" fill="#ffffff">HV-rated SiC power devices &gt;5kW blocking voltage</tspan></text></g></g></g><g clip-path="url(#clip005)"><g><g transform="translate(109.3333,66.96533)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="bold" font-style="normal" font-size="21.33333" fill="#000000">Architecture</tspan></text></g></g></g><g clip-path="url(#clip006)"><g><g transform="translate(320,66.96533)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Series stacking of multiple devices, often in three to five-level architectures</tspan></text></g></g><g><g transform="translate(914.6667,66.96533)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Wolfspeed 10kV die can enable a simple two-level cell</tspan></text></g></g></g><g clip-path="url(#clip007)"><g><g transform="translate(114.6667,105.632)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="bold" font-style="normal" font-size="21.33333" fill="#000000">Modularity</tspan></text></g></g></g><g clip-path="url(#clip008)"><g><g transform="translate(320,105.632)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Smaller building blocks are easier to handle and service</tspan></text></g></g><g><g transform="translate(914.6667,105.632)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Larger and less modular therefore not as easy to handle</tspan></text></g></g></g><g clip-path="url(#clip009)"><g><g transform="translate(118.6667,144.2987)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="bold" font-style="normal" font-size="21.33333" fill="#000000">Insulation</tspan></text></g></g></g><g clip-path="url(#clip010)"><g><g transform="translate(320,144.2987)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Requires precise attention to insulation coordination between cells</tspan></text></g></g><g><g transform="translate(914.6667,144.2987)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Simpler insulation</tspan></text></g></g></g><g clip-path="url(#clip011)"><g><g transform="translate(94.66666,182.9653)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="bold" font-style="normal" font-size="21.33333" fill="#000000">Control Scheme</tspan></text></g></g></g><g clip-path="url(#clip012)"><g><g transform="translate(320,182.9653)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Control algo needed to gate series switches for cleaner output</tspan></text></g></g><g><g transform="translate(914.6667,182.9653)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Less complex control scheme due to fewer cells</tspan></text></g></g></g><g clip-path="url(#clip013)"><g><g transform="translate(113.3333,221.632)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="bold" font-style="normal" font-size="21.33333" fill="#000000">Gate Driver</tspan></text></g></g></g><g clip-path="url(#clip014)"><g><g transform="translate(320,221.632)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">3.3kW rated SiC gate drivers commercially available</tspan></text></g></g><g><g transform="translate(914.6667,221.632)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Very few comparable solutions available above 3.3kV requiring vendors to do custom development and qualification</tspan></text></g></g></g><g clip-path="url(#clip015)"><g><g transform="translate(16,260.2987)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="bold" font-style="normal" font-size="21.33333" fill="#000000">Electromagnetic Interference (EMI)</tspan></text></g></g></g><g clip-path="url(#clip016)"><g><g transform="translate(320,260.2987)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Multi-level architecture requires smaller dv/dt</tspan></text></g></g><g><g transform="translate(914.6667,260.2987)"><text><tspan x="0" y="0" font-family="Connections Cond Light,Arial Narrow" font-weight="normal" font-style="normal" font-size="21.33333" fill="#000000">Switch with high dv/dt requiring ultra-low-parasitic design</tspan></text></g></g></g></g><g /><g /></g></g></g></g></g></g></svg>